services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - UPLOAD_DIR=/app/data/uploads
      - CHROMA_PATH=/app/data/chroma
      - SQLITE_PATH=/app/data/sqlite/paperops.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "7862:7862"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

